<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>marketSystem - Admin Dashboard</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.2.9/css/responsive.dataTables.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --secondary: #7c3aed;
            --secondary-dark: #6d28d9;
            --accent: #f59e0b;
            --success: #059669;
            --success-light: #10b981;
            --warning: #d97706;
            --danger: #dc2626;
            --dark: #111827;
            --dark-light: #1f2937;
            --gray-dark: #374151;
            --gray: #6b7280;
            --gray-light: #9ca3af;
            --gray-lighter: #e5e7eb;
            --light: #f3f4f6;
            --white: #ffffff;
            --gold: #FFD700;
            --gold-light: #FFED4A;
            --gold-dark: #CCAC00;
            --table-bg: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            background: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=2024&auto=format&fit=crop') center/cover fixed no-repeat;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(37, 99, 235, 0.95) 0%, 
                rgba(124, 58, 237, 0.95) 50%,
                rgba(219, 39, 119, 0.95) 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,215,0,0.15) 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, rgba(255,215,0,0.15) 3px, transparent 3px);
            background-size: 200px 200px;
            animation: floatParticles 20s linear infinite;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header {
            background: var(--table-bg);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 80px;
            height: 80px;
            border-top: 4px solid var(--gold);
            border-left: 4px solid var(--gold);
            border-radius: 50px 0 0 0;
            opacity: 0.7;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 20px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .user-info i {
            color: var(--gold);
            font-size: 1.2rem;
        }

        .user-info span {
            color: var(--gold-light);
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(220, 38, 38, 0.15);
            color: #ffb3b3;
            padding: 10px 25px;
            border-radius: 40px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(220, 38, 38, 0.25);
            transform: translateY(-2px);
            color: #ffcccc;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--table-bg);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 215, 0, 0.3);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            flex: 0 1 auto;
        }

        .tab-btn i {
            color: var(--gold);
            font-size: 1.2rem;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: var(--dark);
            border-color: transparent;
        }

        .tab-btn.active i {
            color: var(--dark);
        }

        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: var(--gold);
            color: white;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--table-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.4);
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon i {
            font-size: 2rem;
            color: var(--dark);
        }

        .stat-info h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .stat-info p {
            color: var(--gold-light);
            font-size: 1rem;
            font-weight: 500;
        }

        /* Table Card */
        .table-card {
            background: var(--table-bg);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .table-card::before {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 80px;
            height: 80px;
            border-top: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
            border-radius: 0 50px 0 0;
            opacity: 0.7;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .section-title i {
            font-size: 2rem;
            color: var(--gold);
        }

        .section-title h2 {
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .section-title span {
            color: var(--gold-light);
            font-size: 1rem;
            margin-left: 15px;
            padding: 5px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            color: var(--gold-light);
            min-width: 250px;
        }

        .search-box::placeholder {
            color: rgba(255,215,0,0.5);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(0,0,0,0.4);
            color: white;
        }

        .filter-select {
            padding: 15px 30px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            color: var(--gold-light);
            cursor: pointer;
        }

        .filter-select option {
            background: var(--dark);
            color: var(--gold-light);
        }

        /* Table Container with Horizontal Scroll */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        .table-container::-webkit-scrollbar {
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: rgba(255,215,0,0.1);
            border-radius: 10px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: var(--gold-light);
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1300px;
        }

        th {
            text-align: left;
            padding: 20px 15px;
            color: var(--gold);
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            white-space: nowrap;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,215,0,0.1);
            color: var(--gold-light);
            white-space: nowrap;
        }

        tr:hover {
            background: rgba(255,215,0,0.1);
        }

        tr:hover td {
            color: white;
        }

        /* DataTables Fixes */
        .dataTables_wrapper,
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate,
        .dataTables_wrapper .dataTables_processing,
        .dataTables_wrapper table.dataTable,
        .dataTables_wrapper table.dataTable thead,
        .dataTables_wrapper table.dataTable tbody,
        .dataTables_wrapper table.dataTable tfoot,
        .dataTables_wrapper table.dataTable tr,
        .dataTables_wrapper table.dataTable th,
        .dataTables_wrapper table.dataTable td {
            background: transparent !important;
            background-color: transparent !important;
        }

        table.dataTable.display tbody tr,
        table.dataTable.display tbody tr.odd,
        table.dataTable.display tbody tr.even,
        table.dataTable.stripe tbody tr.odd,
        table.dataTable.stripe tbody tr.even,
        table.dataTable tbody tr,
        table.dataTable tbody tr.odd,
        table.dataTable tbody tr.even {
            background: transparent !important;
            background-color: transparent !important;
        }

        .table-container table.dataTable {
            background: transparent !important;
        }

        .table-container table.dataTable tbody {
            background: transparent !important;
        }

        .table-container table.dataTable tbody tr {
            background: transparent !important;
        }

        .table-container table.dataTable tbody td {
            background: transparent !important;
        }

        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate {
            color: var(--gold-light) !important;
            margin: 15px 0 !important;
        }

        .dataTables_wrapper .dataTables_filter input,
        .dataTables_wrapper .dataTables_length select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255,215,0,0.3) !important;
            color: var(--gold-light) !important;
            border-radius: 30px !important;
            padding: 8px 15px !important;
            margin-left: 10px !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: var(--gold-light) !important;
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255,215,0,0.2) !important;
            border-radius: 30px !important;
            margin: 0 3px !important;
            padding: 8px 16px !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background: rgba(255,215,0,0.2) !important;
            color: white !important;
            border-color: var(--gold) !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: linear-gradient(135deg, #FFD700, #FFA500) !important;
            color: var(--dark) !important;
            border-color: transparent !important;
        }

        /* Status Badges */
        .status-badge {
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .status-verified {
            background: rgba(5,150,105,0.2);
            color: #4ade80;
            border: 1px solid rgba(74,222,128,0.3);
        }

        .status-pending {
            background: rgba(217,119,6,0.2);
            color: #fcd34d;
            border: 1px solid rgba(252,211,77,0.3);
        }

        .status-paid {  /* Changed from status-unpaid to status-paid */
            background: rgba(59,130,246,0.2);
            color: #93c5fd;
            border: 1px solid rgba(147,197,253,0.3);
        }

        .role-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .role-admin {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: var(--dark);
        }

        .role-user {
            background: rgba(255,255,255,0.15);
            color: var(--gold-light);
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* Action Buttons */
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            background: transparent;
            border: 1px solid;
            white-space: nowrap;
            margin: 0 3px;
        }

        .btn-verify {
            color: var(--gold);
            border-color: var(--gold);
        }

        .btn-verify:hover {
            background: rgba(255,215,0,0.2);
            transform: translateY(-2px);
            color: white;
        }

        .btn-view {
            color: #93c5fd;
            border-color: #93c5fd;
        }

        .btn-view:hover {
            background: rgba(147,197,253,0.2);
            transform: translateY(-2px);
            color: white;
        }

        .btn-delete {
            color: #f87171;
            border-color: #f87171;
        }

        .btn-delete:hover {
            background: rgba(248,113,113,0.2);
            transform: translateY(-2px);
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--table-bg);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255,215,0,0.4);
            position: relative;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 80px;
            height: 80px;
            border-top: 4px solid var(--gold);
            border-left: 4px solid var(--gold);
            border-radius: 50px 0 0 0;
            opacity: 0.7;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            color: var(--gold);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--gold);
            transition: transform 0.3s;
        }

        .close-modal:hover {
            transform: scale(1.2);
            color: white;
        }

        .detail-row {
            display: flex;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .detail-label {
            width: 40%;
            font-weight: 600;
            color: var(--gold);
        }

        .detail-value {
            width: 60%;
            color: var(--gold-light);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 3px solid rgba(255,215,0,0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--gold-light);
            font-size: 1.1rem;
        }

        .referral-code {
            background: rgba(255,215,0,0.15);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            color: var(--gold);
            border: 1px solid rgba(255,215,0,0.2);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            
            .user-menu {
                width: 100%;
                justify-content: space-between;
            }

            .tab-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }

            .table-card {
                padding: 20px;
            }

            .section-title h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-tabs {
                flex-direction: column;
            }
            
            .tab-btn {
                width: 100%;
                justify-content: center;
            }

            .filter-section {
                flex-direction: column;
            }

            .search-box, .filter-select {
                width: 100%;
            }

            .logo span {
                font-size: 1.5rem;
            }

            .admin-badge {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-shield-crown"></i>
                <span>Admin Panel</span>
                <div class="admin-badge">
                    <i class="fas fa-crown"></i> Administrator
                </div>
            </div>
            <div class="user-menu">
                <div class="user-info" id="adminInfo">
                    <i class="fas fa-user-shield"></i>
                    <span>Loading...</span>
                </div>
                <a href="#" class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('dashboard')">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </button>
            <button class="tab-btn" onclick="showTab('users')">
                <i class="fas fa-users"></i> User Management
            </button>
            <button class="tab-btn" onclick="showTab('payments')">
                <i class="fas fa-credit-card"></i> Payment Tables
            </button>
            <button class="tab-btn" onclick="showTab('admin-payments')">
                <i class="fas fa-table"></i> Admin Payment Table
            </button>
        </div>

        <!-- Content Area -->
        <div id="content">
            <!-- Dashboard Tab -->
            <div id="dashboard-tab">
                <!-- Stats -->
                <div class="stats-grid" id="statsGrid"></div>

                <!-- ALL USERS -->
                <div class="table-card">
                    <div class="section-title">
                        <i class="fas fa-users"></i>
                        <h2>All Users</h2>
                        <span id="totalUsersCount"></span>
                    </div>
                    <div class="filter-section">
                        <input type="text" id="dashboardUserSearch" class="search-box" placeholder="Search users...">
                        <select id="dashboardRoleFilter" class="filter-select">
                            <option value="">All Roles</option>
                            <option value="admin">Admin</option>
                            <option value="user">User</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table id="dashboardUsersTable" class="display responsive nowrap" style="width:100%">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Country</th>
                                    <th>Referral Code</th>
                                    <th>Referred By</th>
                                    <th>Role</th>
                                    <th>Created At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="dashboardUsersBody">
                                <tr><td colspan="11" class="loading"><div class="spinner"></div>Loading users...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- ALL PAYMENTS -->
                <div class="table-card">
                    <div class="section-title">
                        <i class="fas fa-credit-card"></i>
                        <h2>All Payments</h2>
                        <span id="dashboardPendingCount"></span>
                    </div>
                    <div class="filter-section">
                        <input type="text" id="dashboardPaymentSearch" class="search-box" placeholder="Search payments...">
                        <select id="dashboardStatusFilter" class="filter-select">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="verified">Verified</option>
                            <option value="paid">Paid</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table id="dashboardPaymentsTable" class="display responsive nowrap" style="width:100%">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>User ID</th>
                                    <th>Phone</th>
                                    <th>Email</th>
                                    <th>Amount</th>
                                    <th>M-PESA Code</th>
                                    <th>Status</th>
                                    <th>Verified By</th>
                                    <th>Verified At</th>
                                    <th>Created At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="dashboardPaymentsBody">
                                <tr><td colspan="11" class="loading"><div class="spinner"></div>Loading payments...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Other tabs (simplified for brevity - keep same as before) -->
            <div id="users-tab" style="display: none;"><!-- same content as before --></div>
            <div id="payments-tab" style="display: none;"><!-- same content as before --></div>
            <div id="admin-payments-tab" style="display: none;"><!-- same content as before --></div>
        </div>
    </div>

    <!-- Modals -->
    <div id="verifyModal" class="modal"><!-- same content as before --></div>
    <div id="deleteModal" class="modal"><!-- same content as before --></div>

    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.2.9/js/dataTables.responsive.min.js"></script>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';
        const adminData = JSON.parse(sessionStorage.getItem('admin') || '{}');

        if (!adminData || !adminData.id || adminData.role !== 'admin') {
            window.location.href = 'admin-login.html';
        }

        document.querySelector('#adminInfo span').textContent = adminData.name || adminData.username;

        let deleteType = null, deleteId = null, currentPaymentId = null;
        let dashboardUsersTable, dashboardPaymentsTable, usersTable, paymentsTable, adminPaymentTable;

        $(document).ready(function() {
            loadDashboardData();
            loadUsersData();
            loadPaymentsData();
        });

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            
            ['dashboard', 'users', 'payments', 'admin-payments'].forEach(t => 
                document.getElementById(t + '-tab').style.display = t === tabName ? 'block' : 'none'
            );

            if (tabName === 'admin-payments' && !adminPaymentTable) loadAdminPaymentData();
        }

        async function loadDashboardData() {
            try {
                const stats = await (await fetch(`${API_URL}/admin_stats.php`)).json();
                if (stats.success) renderStats(stats.stats);

                const users = await (await fetch(`${API_URL}/get_all_users.php`)).json();
                if (users.success) {
                    renderDashboardUsers(users.users);
                    document.getElementById('totalUsersCount').textContent = `(${users.users.length} total)`;
                }

                const payments = await (await fetch(`${API_URL}/get_all_payments.php`)).json();
                if (payments.success) {
                    renderDashboardPayments(payments.payments);
                    const pending = payments.payments.filter(p => p.status === 'pending').length;
                    document.getElementById('dashboardPendingCount').textContent = `(${pending} pending)`;
                }
            } catch (error) { console.error('Error:', error); }
        }

        function renderStats(stats) {
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>${stats.totalUsers || 0}</h3><p>Total Users</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-user-plus"></i></div><div class="stat-info"><h3>${stats.newUsersToday || 0}</h3><p>New Today</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-credit-card"></i></div><div class="stat-info"><h3>${stats.totalPayments || 0}</h3><p>Total Payments</p></div></div>
                <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>${stats.pendingPayments || 0}</h3><p>Pending Verification</p></div></div>
            `;
        }

        function renderDashboardUsers(users) {
            const tbody = document.getElementById('dashboardUsersBody');
            tbody.innerHTML = users.map(user => {
                const deleteBtn = user.role === 'admin' 
                    ? '<span class="status-badge" style="color: var(--gold);">Protected</span>'
                    : `<button class="action-btn btn-delete" onclick="openDeleteModal('user', ${user.id}, '${user.name}')"><i class="fas fa-trash-alt"></i> Delete</button>`;
                
                return `<tr>
                    <td>${user.id}</td><td>${user.name || 'N/A'}</td><td>${user.username}</td><td>${user.email}</td>
                    <td>${user.phone || 'N/A'}</td><td>${user.country || 'N/A'}</td>
                    <td><span class="referral-code">${user.referral_code}</span></td><td>${user.referred_by || 'N/A'}</td>
                    <td><span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role}</span></td>
                    <td>${new Date(user.created_at).toLocaleString()}</td><td>${deleteBtn}</td>
                </tr>`;
            }).join('');

            if (dashboardUsersTable) dashboardUsersTable.destroy();
            dashboardUsersTable = $('#dashboardUsersTable').DataTable({ responsive: false, pageLength: 25, order: [[0, 'desc']] });
            $('#dashboardUserSearch').off().on('keyup', function() { dashboardUsersTable.search(this.value).draw(); });
            $('#dashboardRoleFilter').off().on('change', function() { dashboardUsersTable.column(8).search(this.value).draw(); });
        }

        function renderDashboardPayments(payments) {
            const tbody = document.getElementById('dashboardPaymentsBody');
            tbody.innerHTML = payments.map(payment => {
                let statusClass = 'status-pending', statusText = 'Pending';
                if (payment.status === 'verified') { statusClass = 'status-verified'; statusText = 'Verified'; }
                else if (payment.status === 'paid') { statusClass = 'status-paid'; statusText = 'Paid'; }

                const verifyBtn = payment.status !== 'verified' && payment.status !== 'paid'
                    ? `<button class="action-btn btn-verify" onclick="openVerifyModal(${payment.id})"><i class="fas fa-check"></i> Verify</button>`
                    : '';

                return `<tr>
                    <td>${payment.id}</td><td>${payment.user_id}</td><td>${payment.phone || 'N/A'}</td><td>${payment.email || 'N/A'}</td>
                    <td>KES ${payment.amount}</td><td>${payment.mpesa_code || 'N/A'}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>${payment.verified_by || 'N/A'}</td>
                    <td>${payment.verified_at ? new Date(payment.verified_at).toLocaleString() : 'N/A'}</td>
                    <td>${new Date(payment.created_at).toLocaleString()}</td>
                    <td>${verifyBtn} <button class="action-btn btn-delete" onclick="openDeleteModal('payment', ${payment.id}, 'Payment #${payment.id}')"><i class="fas fa-trash-alt"></i> Delete</button></td>
                </tr>`;
            }).join('');

            if (dashboardPaymentsTable) dashboardPaymentsTable.destroy();
            dashboardPaymentsTable = $('#dashboardPaymentsTable').DataTable({ responsive: false, pageLength: 25, order: [[0, 'desc']] });
            $('#dashboardPaymentSearch').off().on('keyup', function() { dashboardPaymentsTable.search(this.value).draw(); });
            $('#dashboardStatusFilter').off().on('change', function() { dashboardPaymentsTable.column(6).search(this.value).draw(); });
        }

        async function loadUsersData() { /* similar to renderDashboardUsers but for users tab */ }
        async function loadPaymentsData() { /* similar to renderDashboardPayments but for payments tab */ }
        async function loadAdminPaymentData() { /* existing code */ }

        function openVerifyModal(paymentId) {
            currentPaymentId = paymentId;
            fetch(`${API_URL}/get_payment_details.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ payment_id: paymentId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const p = data.payment;
                    document.getElementById('modalDetails').innerHTML = `
                        <div class="detail-row"><div class="detail-label">Payment ID:</div><div class="detail-value">${p.id}</div></div>
                        <div class="detail-row"><div class="detail-label">User:</div><div class="detail-value">${p.name} (${p.email})</div></div>
                        <div class="detail-row"><div class="detail-label">Phone:</div><div class="detail-value">${p.phone}</div></div>
                        <div class="detail-row"><div class="detail-label">Amount:</div><div class="detail-value">KES ${p.amount}</div></div>
                        <div class="detail-row"><div class="detail-label">M-PESA Code:</div><div class="detail-value">${p.mpesa_code}</div></div>
                        <div class="detail-row"><div class="detail-label">Current Status:</div><div class="detail-value">
                            <span class="status-badge ${p.status === 'pending' ? 'status-pending' : p.status === 'verified' ? 'status-verified' : 'status-paid'}">${p.status}</span>
                        </div></div>
                    `;
                    document.getElementById('verifyModal').style.display = 'flex';
                }
            });
        }

        function closeModal() {
            document.getElementById('verifyModal').style.display = 'none';
            currentPaymentId = null;
        }

        async function updatePaymentStatus(status) {
            if (!currentPaymentId) return;
            
            const paymentId_int = parseInt(currentPaymentId);
            if (isNaN(paymentId_int)) { alert('Invalid payment ID'); return; }

            try {
                const response = await fetch(`${API_URL}/update_payment_status.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        payment_id: paymentId_int,
                        status: status,
                        verified_by: adminData.name || adminData.username
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`Payment ${status} successfully!`);
                    closeModal();
                    loadDashboardData();
                    if (paymentsTable) loadPaymentsData();
                    if (adminPaymentTable) loadAdminPaymentData();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        function openDeleteModal(type, id, name) {
            deleteType = type; deleteId = id;
            document.getElementById('deleteModalDetails').innerHTML = `
                <div class="detail-row"><div class="detail-label">Type:</div><div class="detail-value">${type.toUpperCase()}</div></div>
                <div class="detail-row"><div class="detail-label">ID:</div><div class="detail-value">${id}</div></div>
                <div class="detail-row"><div class="detail-label">Details:</div><div class="detail-value">${name}</div></div>
                <div style="color: #f87171; margin-top: 15px; text-align: center;"><i class="fas fa-exclamation-triangle"></i> This action cannot be undone!</div>
            `;
            document.getElementById('deleteModal').style.display = 'flex';
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            deleteType = null; deleteId = null;
        }

        async function confirmDelete() {
            const password = document.getElementById('confirmPassword').value;
            if (!password) { alert('Enter admin password'); return; }

            try {
                const verify = await (await fetch(`${API_URL}/admin_login.php`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: adminData.username || adminData.email, password })
                })).json();

                if (!verify.success) { alert('Invalid password!'); return; }

                const delId = parseInt(deleteId), adminId = parseInt(adminData.id);
                if (isNaN(delId) || isNaN(adminId)) { alert('Invalid ID'); return; }

                const endpoint = deleteType === 'user' ? 'delete_user.php' : 'delete_payment.php';
                const del = await (await fetch(`${API_URL}/${endpoint}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: delId, admin_id: adminId })
                })).json();

                if (del.success) {
                    alert(`${deleteType} deleted!`);
                    closeDeleteModal();
                    loadDashboardData();
                    if (usersTable) loadUsersData();
                    if (paymentsTable) loadPaymentsData();
                    if (adminPaymentTable) loadAdminPaymentData();
                } else alert('Error: ' + del.message);
            } catch (error) { alert('Connection error'); }
        }

        function logout() {
            sessionStorage.removeItem('admin');
            window.location.href = 'admin-login.html';
        }
    </script>
</body>
</html>
