<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MarketSystem - Login</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --secondary: #7c3aed;
            --secondary-dark: #6d28d9;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #0f172a;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --light: #f8fafc;
            --white: #ffffff;
            --gold: #FFD700;
            --gold-light: #FFED4A;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-y: auto;
            background: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=2024&auto=format&fit=crop') center/cover fixed no-repeat;
        }

        /* Overlay with animated gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(37, 99, 235, 0.85) 0%, 
                rgba(124, 58, 237, 0.85) 50%,
                rgba(219, 39, 119, 0.85) 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 3px, transparent 3px),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 90% 20%, rgba(255,255,255,0.1) 4px, transparent 4px),
                radial-gradient(circle at 10% 60%, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 200px 200px;
            animation: floatParticles 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes floatParticles {
            from { background-position: 0 0; }
            to { background-position: 200px 200px; }
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            margin: auto;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-container {
            background: transparent;
            backdrop-filter: blur(20px);
            padding: 50px 45px;
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-height: none;
            overflow-y: visible;
            position: relative;
        }

        /* Decorative corner elements */
        .form-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 80px;
            height: 80px;
            border-top: 4px solid var(--gold);
            border-left: 4px solid var(--gold);
            border-radius: 50px 0 0 0;
            opacity: 0.5;
        }

        .form-container::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 80px;
            height: 80px;
            border-bottom: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
            border-radius: 0 0 50px 0;
            opacity: 0.5;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .logo i {
            font-size: 80px;
            background: linear-gradient(135deg, #4158D0, #C850C0, #FFCC70);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
            animation: pulse 3s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #4158D0, #C850C0, #FFCC70);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-shadow: 2px 2px 30px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
        }

        h3 {
            text-align: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 35px;
            font-weight: 700;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h3::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #4158D0, #C850C0, #FFCC70, transparent);
            border-radius: 2px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .form-group label i {
            color: var(--gold);
            width: 25px;
            font-size: 1.3rem;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.3));
        }

        .form-group input {
            width: 100%;
            padding: 18px 22px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.1);
            color: white; /* This makes the input text visible */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        /* This ensures the actual typed text is bright white */
        .form-group input:focus,
        .form-group input:not(:placeholder-shown) {
            color: white;
            font-weight: 500;
        }

        .form-group input:hover {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2), 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(-2px);
            color: white; /* Ensure text stays white on focus */
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 18px 22px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-family: 'Inter', sans-serif;
            margin: 25px 0 20px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4158D0, #C850C0, #FFCC70);
            background-size: 200% 200%;
            color: var(--white);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.3);
            animation: gradientMove 5s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        .btn-primary i {
            font-size: 1.2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Message - Styled to work with auth.js */
        .message {
            margin: 25px 0;
            padding: 15px 25px;
            border-radius: 20px;
            text-align: center;
            font-size: 1rem;
            display: none;
            animation: fadeInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: 600;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ff9999;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            color: #a7f3d0;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Text Center - Now in GOLD */
        .text-center {
            text-align: center;
            margin-top: 25px;
            color: var(--gold);
            font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-weight: 500;
            position: relative;
        }

        .text-center a {
            color: var(--gold-light);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            font-size: 1.1rem;
            position: relative;
            padding: 5px 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .text-center a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .text-center a:hover::before {
            transform: scaleX(1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .form-container {
                padding: 35px 30px;
                border-radius: 40px;
            }

            .logo i {
                font-size: 70px;
            }

            .logo h2 {
                font-size: 2.2rem;
            }

            h3 {
                font-size: 1.6rem;
            }

            .form-group input {
                padding: 16px 20px;
                font-size: 1rem;
                border-radius: 20px;
            }

            .btn {
                padding: 16px 20px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 25px 20px;
            }

            .logo i {
                font-size: 60px;
            }

            .logo h2 {
                font-size: 2rem;
            }

            h3 {
                font-size: 1.4rem;
                margin-bottom: 25px;
                white-space: normal;
            }

            .form-group {
                margin-bottom: 25px;
            }

            .form-group label {
                font-size: 1rem;
            }

            .form-group input {
                padding: 14px 18px;
                border-radius: 16px;
                font-size: 0.95rem;
            }

            .btn {
                padding: 14px 18px;
                font-size: 1rem;
            }

            .text-center {
                font-size: 1rem;
            }
            
            .text-center a {
                font-size: 1rem;
            }
        }

        /* Loading Spinner - For auth.js loading states */
        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 14px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 7px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #4158D0, #C850C0);
            border-radius: 7px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #C850C0, #FFCC70);
        }
    </style>
    
    <!-- Keep original CSS link for any additional styles -->
    
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="logo">
                <i class="fas fa-store"></i>
                <h2>MarketSystem</h2>
            </div>
            <h3>Login to Your Account</h3>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username or Email
                    </label>
                    <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
            </form>
            
            <div id="message" class="message"></div>
            
            <p class="text-center">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>
    
    <!-- Keep original auth.js - NO CHANGES TO FUNCTIONALITY -->
    <script src="js/auth.js"></script>
</body>
</html>
