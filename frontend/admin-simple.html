<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Simple View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            color: #333;
        }
        h1 { color: #2563eb; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #2563eb;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        .pending { color: #d97706; font-weight: bold; }
        .verify-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .message {
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }
        .success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: white;">Admin Payment Verification</h1>
    
    <div class="container">
        <h2>Pending Transactions</h2>
        <div id="message" class="message"></div>
        
        <div id="loading" style="text-align: center; padding: 30px;">
            <div style="border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;"></div>
            <p>Loading transactions...</p>
        </div>
        
        <div id="content" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>M-PESA Code</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="transactionsList"></tbody>
            </table>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';
        
        async function loadTransactions() {
            try {
                const response = await fetch(`${API_URL}/admin_transactions.php`);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                if (data.success) {
                    displayTransactions(data.transactions);
                } else {
                    showError(data.message || 'Failed to load transactions');
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                showError('Connection error: ' + error.message);
            }
        }

        function displayTransactions(transactions) {
            const tbody = document.getElementById('transactionsList');
            
            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 30px;">No pending transactions</td></tr>';
                return;
            }

            tbody.innerHTML = transactions.map(t => `
                <tr>
                    <td>${new Date(t.created_at).toLocaleString()}</td>
                    <td>${t.phone}</td>
                    <td>${t.email}</td>
                    <td><strong>${t.mpesa_code}</strong></td>
                    <td>KES ${t.amount}</td>
                    <td>
                        <button class="verify-btn" onclick="verifyTransaction(${t.id}, this)">
                            Verify
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function verifyTransaction(id, btn) {
            btn.disabled = true;
            btn.innerHTML = 'Verifying...';
            
            try {
                const response = await fetch(`${API_URL}/admin_verify.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        transaction_id: id,
                        admin_id: 1
                    })
                });

                const data = await response.json();
                const messageDiv = document.getElementById('message');

                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Transaction verified successfully!';
                    loadTransactions(); // Reload list
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '❌ ' + data.message;
                    btn.disabled = false;
                    btn.innerHTML = 'Verify';
                }
            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Connection error';
                btn.disabled = false;
                btn.innerHTML = 'Verify';
            }
        }

        function showError(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message error';
            messageDiv.innerHTML = '❌ ' + message;
        }

        // Load transactions on page load
        loadTransactions();
    </script>
</body>
</html>
