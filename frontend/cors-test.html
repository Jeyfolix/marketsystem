<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; }
        button { padding: 15px; width: 100%; margin: 5px 0; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        pre { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 8px; overflow: auto; }
        .success { color: #10b981; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 CORS & Connection Test</h1>
        
        <div class="card">
            <h3>Test 1: Simple GET Request</h3>
            <button onclick="testGET()">Test GET (test.php)</button>
            <pre id="result1">Click to test...</pre>
        </div>

        <div class="card">
            <h3>Test 2: POST Request (Dashboard API)</h3>
            <button onclick="testPOST()">Test POST with User ID 1</button>
            <pre id="result2">Click to test...</pre>
        </div>

        <div class="card">
            <h3>Test 3: CORS Preflight Check</h3>
            <button onclick="testCORS()">Test OPTIONS Request</button>
            <pre id="result3">Click to test...</pre>
        </div>

        <div class="card">
            <h3>Test 4: JSONP Fallback (if CORS fails)</h3>
            <button onclick="testJSONP()">Test JSONP Method</button>
            <pre id="result4">Click to test...</pre>
        </div>
    </div>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';

        async function testGET() {
            const result = document.getElementById('result1');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(`${API_URL}/test.php`);
                const text = await response.text();
                result.innerHTML = `Status: ${response.status}\n\n${text}`;
            } catch (error) {
                result.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        async function testPOST() {
            const result = document.getElementById('result2');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(`${API_URL}/dashboard.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 1 })
                });
                const text = await response.text();
                result.innerHTML = `Status: ${response.status}\n\n${text}`;
            } catch (error) {
                result.innerHTML = `❌ Error: ${error.message}`;
            }
        }

        async function testCORS() {
            const result = document.getElementById('result3');
            result.innerHTML = 'Testing preflight...';
            
            try {
                const response = await fetch(`${API_URL}/dashboard.php`, {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'content-type'
                    }
                });
                
                let headers = '';
                response.headers.forEach((value, key) => {
                    headers += `${key}: ${value}\n`;
                });
                
                result.innerHTML = `Preflight Status: ${response.status}\n\nResponse Headers:\n${headers}`;
            } catch (error) {
                result.innerHTML = `❌ CORS Preflight Error: ${error.message}`;
            }
        }

        // JSONP fallback (if CORS is completely blocked)
        function testJSONP() {
            const result = document.getElementById('result4');
            result.innerHTML = 'Testing JSONP...\n\n';
            
            const script = document.createElement('script');
            const callbackName = 'jsonp_callback_' + Date.now();
            
            window[callbackName] = function(data) {
                result.innerHTML += `✅ Success! Data received:\n${JSON.stringify(data, null, 2)}`;
                document.body.removeChild(script);
                delete window[callbackName];
            };
            
            script.src = `${API_URL}/dashboard.php?callback=${callbackName}&user_id=1`;
            script.onerror = function() {
                result.innerHTML += '❌ JSONP failed - API might not support JSONP';
                document.body.removeChild(script);
                delete window[callbackName];
            };
            
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
