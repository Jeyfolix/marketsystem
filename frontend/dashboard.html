<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>marketSystem - Your Dashboard</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #60a5fa;
            --secondary: #7c3aed;
            --secondary-dark: #5b21b6;
            --accent: #f59e0b;
            --success: #059669;
            --success-light: #10b981;
            --warning: #d97706;
            --danger: #dc2626;
            --dark: #111827;
            --dark-light: #1f2937;
            --gray-dark: #374151;
            --gray: #6b7280;
            --gray-light: #9ca3af;
            --light: #f3f4f6;
            --white: #ffffff;
            --gold: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            position: relative;
            min-height: 100vh;
            padding: 20px;
        }

        /* Navbar - unchanged */
        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--light);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .profile-image {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .user-info .welcome-text {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .user-info .user-name {
            font-weight: 600;
            color: var(--dark);
        }

        .btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Dashboard Container */
        .dashboard-container {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Sidebar - unchanged */
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            padding: 15px 20px;
            margin: 5px 0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--gray-dark);
            transition: all 0.3s;
        }

        .sidebar-menu li:hover {
            background: var(--light);
            color: var(--primary);
        }

        .sidebar-menu li.active {
            background: var(--primary);
            color: white;
        }

        .sidebar-menu li i {
            width: 22px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
        }

        /* Welcome Banner - unchanged */
        .welcome-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            padding: 30px;
            color: white;
            margin-bottom: 30px;
        }

        .welcome-banner h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* Stats Grid - unchanged */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .stat-icon i {
            font-size: 1.8rem;
            color: white;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--gray);
            font-weight: 500;
        }

        /* Payment Status Card - NEW */
        .payment-status-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-left: 5px solid;
            transition: all 0.3s;
        }

        .payment-status-card.pending {
            border-left-color: var(--warning);
        }

        .payment-status-card.verified {
            border-left-color: var(--success);
        }

        .payment-status-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .payment-status {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-verified {
            background: #d1fae5;
            color: #059669;
        }

        /* Payment Section - NEW */
        .payment-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .payment-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .payment-header h2 {
            color: var(--dark);
            margin-bottom: 10px;
        }

        .payment-header p {
            color: var(--gray);
        }

        .mpesa-details {
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: center;
        }

        .mpesa-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .copy-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37,99,235,0.3);
        }

        .amount-badge {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--gray-light);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .verify-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }

        .verify-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: var(--success);
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: var(--danger);
            display: block;
        }

        /* Transactions Table - NEW */
        .transactions-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .transactions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .transactions-table th {
            background: var(--light);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
        }

        .transactions-table td {
            padding: 15px;
            border-bottom: 1px solid var(--gray-light);
        }

        .transactions-table tr:hover {
            background: var(--light);
        }

        .badge-pending {
            background: #fef3c7;
            color: #d97706;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-verified {
            background: #d1fae5;
            color: #059669;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Referral Section - unchanged */
        .referral-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .referral-header h2 {
            color: var(--dark);
            margin-bottom: 20px;
        }

        .referral-code-box {
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            border: 2px dashed var(--primary);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .referral-code-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .referral-link-box {
            background: var(--light);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid var(--primary-light);
            display: none;
        }

        .link-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .link-input-group input {
            flex: 1;
            padding: 15px;
            border: 2px solid var(--gray-light);
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .social-share {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-btn:hover {
            transform: translateY(-3px) scale(1.1);
        }

        .social-btn.whatsapp { background: #25D366; }
        .social-btn.facebook { background: #1877f2; }
        .social-btn.twitter { background: #1DA1F2; }
        .social-btn.telegram { background: #0088cc; }

        /* Marketing Content - unchanged */
        .marketing-content {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .info-card h3 {
            color: var(--dark);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .benefits-list {
            list-style: none;
        }

        .benefits-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: var(--gray-dark);
        }

        .benefits-list i {
            color: var(--success);
        }

        /* Withdrawal Section - unchanged */
        .withdrawal-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .withdrawal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .min-amount {
            background: var(--primary);
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
        }

        .withdrawal-methods {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .method-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border: 2px solid var(--gray-light);
            border-radius: 15px;
            cursor: pointer;
        }

        .method-card.selected {
            border-color: var(--primary);
            background: rgba(37,99,235,0.05);
        }

        .method-icon {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .method-icon i {
            color: white;
            font-size: 1.5rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            border: 2px solid var(--gray-light);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .input-group span {
            padding: 15px 20px;
            background: var(--light);
            border-right: 2px solid var(--gray-light);
        }

        .input-group input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
        }

        .withdraw-btn {
            width: 100%;
            padding: 15px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Recent Activity - unchanged */
        .recent-activity {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--light);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .activity-avatar {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        .activity-amount {
            color: var(--success);
            font-weight: 700;
            margin-left: auto;
        }

        /* Responsive - unchanged */
        @media (max-width: 1024px) {
            .dashboard-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .marketing-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .withdrawal-methods {
                grid-template-columns: 1fr;
            }
            .link-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-store"></i>
                <span>marketSystem</span>
            </div>
            <div class="nav-user">
                <div class="user-profile">
                    <div class="profile-image" id="profileImage">JF</div>
                    <div class="user-info">
                        <div class="welcome-text">Welcome back,</div>
                        <div class="user-name" id="userName">Loading...</div>
                    </div>
                </div>
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>

        <div class="dashboard-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <ul class="sidebar-menu">
                    <li class="active" onclick="showSection('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
                    <li onclick="window.location.href='payments-page.html'"><i class="fas fa-money-bill-wave"></i> Payments</li>
                    <li onclick="showSection('referrals')"><i class="fas fa-link"></i> My Referrals</li>
                    <li onclick="showSection('earnings')"><i class="fas fa-chart-line"></i> Earnings</li>
                    <li onclick="showSection('withdraw')"><i class="fas fa-hand-holding-usd"></i> Withdraw</li>
                    <li onclick="showSection('settings')"><i class="fas fa-cog"></i> Settings</li>
                </ul>
            </aside>

            <!-- Main Content -->
            <main class="main-content" id="mainContent">
                <!-- Content will be dynamically loaded -->
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/payment.js"></script>
</body>
</html>
