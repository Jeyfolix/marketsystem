<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>marketSystem - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .referral-section {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .referral-code-box {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 2px dashed rgba(255,255,255,0.5);
        }
        
        .referral-link-box {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .referral-link-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .copy-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-card i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .recent-activity {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-user {
            font-weight: bold;
            color: #333;
        }
        
        .activity-earnings {
            color: #48bb78;
            font-weight: bold;
        }
        
        .activity-date {
            color: #999;
            font-size: 0.9em;
        }
        
        .withdraw-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }
        
        .withdraw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }
        
        .social-share {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            transition: transform 0.3s;
        }
        
        .social-btn:hover {
            transform: scale(1.1);
        }
        
        .social-btn.whatsapp { background: #25D366; }
        .social-btn.facebook { background: #1877F2; }
        .social-btn.twitter { background: #1DA1F2; }
        .social-btn.telegram { background: #0088cc; }
    </style>
</head>
<body>
    <div class="dashboard">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-store"></i>
                <span>marketSystem</span>
            </div>
            <div class="nav-user">
                <span>Welcome, <span id="userName"></span>!</span>
                <button id="logoutBtn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </nav>
        
        <div class="dashboard-container">
            <aside class="sidebar">
                <ul class="sidebar-menu">
                    <li class="active">
                        <i class="fas fa-tachometer-alt"></i>
                        Dashboard
                    </li>
                    <li>
                        <i class="fas fa-link"></i>
                        My Referrals
                    </li>
                    <li>
                        <i class="fas fa-chart-line"></i>
                        Earnings
                    </li>
                    <li>
                        <i class="fas fa-users"></i>
                        Team
                    </li>
                    <li>
                        <i class="fas fa-cog"></i>
                        Settings
                    </li>
                </ul>
            </aside>
            
            <main class="main-content">
                <!-- Referral Section -->
                <div class="referral-section">
                    <h2>Your Referral Code</h2>
                    <div class="referral-code-box" id="referralCode">REFXXXXXX</div>
                    <p>Share this code with friends and earn KES 150 per referral!</p>
                    
                    <div class="referral-link-box">
                        <input type="text" id="referralLink" readonly value="https://jeyfolix.github.io/marketsystem/frontend/register.html?ref=">
                        <button class="copy-btn" onclick="copyReferralLink()">
                            <i class="fas fa-copy"></i> Copy Link
                        </button>
                    </div>
                    
                    <div class="social-share">
                        <a href="#" class="social-btn whatsapp" onclick="shareOnWhatsApp()"><i class="fab fa-whatsapp"></i></a>
                        <a href="#" class="social-btn facebook" onclick="shareOnFacebook()"><i class="fab fa-facebook"></i></a>
                        <a href="#" class="social-btn twitter" onclick="shareOnTwitter()"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-btn telegram" onclick="shareOnTelegram()"><i class="fab fa-telegram"></i></a>
                    </div>
                </div>
                
                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div class="stat-value" id="totalReferrals">0</div>
                        <div class="stat-label">Total Referrals</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-coins"></i>
                        <div class="stat-value" id="totalEarnings">KES 0</div>
                        <div class="stat-label">Total Earnings</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-wallet"></i>
                        <div class="stat-value" id="availableBalance">KES 0</div>
                        <div class="stat-label">Available Balance</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-trophy"></i>
                        <div class="stat-value" id="rank">Bronze</div>
                        <div class="stat-label">Your Rank</div>
                    </div>
                </div>
                
                <!-- Recent Activity -->
                <div class="recent-activity">
                    <h3>Recent Referrals</h3>
                    <div id="recentActivity">
                        <div class="activity-item">
                            <span class="activity-user">No referrals yet</span>
                            <span class="activity-earnings"></span>
                            <span class="activity-date"></span>
                        </div>
                    </div>
                </div>
                
                <!-- Withdraw Button -->
                <button class="withdraw-btn" onclick="withdrawEarnings()">
                    <i class="fas fa-hand-holding-usd"></i> Withdraw Earnings to M-PESA
                </button>
            </main>
        </div>
    </div>
    
    <script>
        // Get user data from session
        const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
        
        if (!userData.id) {
            window.location.href = 'index.html';
        }
        
        // Display user name
        document.getElementById('userName').textContent = userData.name || userData.username;
        
        // Set referral code and link
        const referralCode = userData.referral_code || 'REF' + String(userData.id).padStart(6, '0');
        document.getElementById('referralCode').textContent = referralCode;
        
        const baseUrl = 'https://jeyfolix.github.io/marketsystem/frontend/register.html';
        const referralLink = `${baseUrl}?ref=${referralCode}`;
        document.getElementById('referralLink').value = referralLink;
        
        // Mock data for demonstration
        document.getElementById('totalReferrals').textContent = '12';
        document.getElementById('totalEarnings').textContent = 'KES 1,800';
        document.getElementById('availableBalance').textContent = 'KES 1,500';
        document.getElementById('rank').textContent = 'Silver';
        
        // Mock recent activity
        const recentActivity = document.getElementById('recentActivity');
        recentActivity.innerHTML = `
            <div class="activity-item">
                <span class="activity-user">Sarah Wanjiku</span>
                <span class="activity-earnings">+KES 150</span>
                <span class="activity-date">2 min ago</span>
            </div>
            <div class="activity-item">
                <span class="activity-user">John Omondi</span>
                <span class="activity-earnings">+KES 150</span>
                <span class="activity-date">1 hour ago</span>
            </div>
            <div class="activity-item">
                <span class="activity-user">Mary Akinyi</span>
                <span class="activity-earnings">+KES 150</span>
                <span class="activity-date">3 hours ago</span>
            </div>
        `;
        
        // Copy referral link function
        function copyReferralLink() {
            const linkInput = document.getElementById('referralLink');
            linkInput.select();
            document.execCommand('copy');
            
            // Show feedback
            const copyBtn = document.querySelector('.copy-btn');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
            }, 2000);
        }
        
        // Social share functions
        function shareOnWhatsApp() {
            const text = `Join marketSystem and start earning! Use my referral code: ${referralCode} - ${referralLink}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
        
        function shareOnFacebook() {
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(referralLink)}`, '_blank');
        }
        
        function shareOnTwitter() {
            const text = `Join marketSystem and start earning! Use my referral code: ${referralCode}`;
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(referralLink)}`, '_blank');
        }
        
        function shareOnTelegram() {
            const text = `Join marketSystem and start earning! Use my referral code: ${referralCode} - ${referralLink}`;
            window.open(`https://t.me/share/url?url=${encodeURIComponent(referralLink)}&text=${encodeURIComponent(text)}`, '_blank');
        }
        
        // Withdraw function
        function withdrawEarnings() {
            alert('Withdrawal request sent! You will receive payment via M-PESA within 24 hours.');
        }
        
        // Logout function
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('user');
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
