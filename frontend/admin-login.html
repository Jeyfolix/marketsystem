<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>marketSystem - Admin Login</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #60a5fa;
            --secondary: #7c3aed;
            --secondary-dark: #6d28d9;
            --accent: #f59e0b;
            --success: #059669;
            --danger: #dc2626;
            --dark: #111827;
            --gray: #6b7280;
            --light: #f3f4f6;
            --white: #ffffff;
            --gold: #FFD700;
            --gold-light: #FFED4A;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?q=80&w=2024&auto=format&fit=crop') center/cover fixed no-repeat;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(37, 99, 235, 0.9) 0%, 
                rgba(124, 58, 237, 0.9) 50%,
                rgba(219, 39, 119, 0.9) 100%);
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.1) 3px, transparent 3px),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.1) 2px, transparent 2px),
                radial-gradient(circle at 90% 20%, rgba(255,255,255,0.1) 4px, transparent 4px);
            background-size: 200px 200px;
            animation: floatParticles 20s linear infinite;
            z-index: 0;
        }

        @keyframes floatParticles {
            from { background-position: 0 0; }
            to { background-position: 200px 200px; }
        }

        .container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: transparent;
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 100px;
            height: 100px;
            border-top: 4px solid var(--gold);
            border-left: 4px solid var(--gold);
            border-radius: 50px 0 0 0;
            opacity: 0.5;
        }

        .login-card::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 100px;
            height: 100px;
            border-bottom: 4px solid var(--gold);
            border-right: 4px solid var(--gold);
            border-radius: 0 0 50px 0;
            opacity: 0.5;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 80px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
            animation: pulse 3s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo h2 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .logo p {
            color: var(--gold);
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .admin-badge {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
            backdrop-filter: blur(5px);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .input-group label i {
            color: var(--gold);
            width: 20px;
        }

        .input-field {
            position: relative;
        }

        .input-field i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 1.2rem;
            z-index: 1;
        }

        .input-field input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .input-field input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-field input:hover {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .input-field input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            color: var(--dark);
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ff9999;
            padding: 15px 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .security-note {
            text-align: center;
            color: var(--gold);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--gold);
            text-decoration: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: rgba(255,215,0,0.1);
            border-color: var(--gold);
            transform: translateX(-5px);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid rgba(255,215,0,0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: white;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }

            .logo i {
                font-size: 60px;
            }

            .logo h2 {
                font-size: 2rem;
            }

            .btn-login {
                padding: 18px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-shield-crown"></i>
                <h2>Admin Access</h2>
                <div class="admin-badge">
                    <i class="fas fa-crown"></i> Secure Admin Login
                </div>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span></span>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>
                        <i class="fas fa-user-shield"></i>
                        Admin Username/Email
                    </label>
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter admin username or email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>
                        <i class="fas fa-key"></i>
                        Password
                    </label>
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter admin password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Access Admin Dashboard
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Verifying admin credentials...</p>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <span>Secured with encryption • Admin access only</span>
                <i class="fas fa-shield-alt"></i>
            </div>

            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to User Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');

            errorDiv.style.display = 'none';
            loginBtn.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/admin_login.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password 
                    })
                });

                const data = await response.json();

                if (data.success && data.user && data.user.role === 'admin') {
                    sessionStorage.setItem('admin', JSON.stringify(data.user));
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorDiv.querySelector('span').textContent = data.message || 'Invalid admin credentials';
                    errorDiv.style.display = 'flex';
                    loginBtn.style.display = 'flex';
                    loading.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.querySelector('span').textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'flex';
                loginBtn.style.display = 'flex';
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
