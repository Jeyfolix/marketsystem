<!DOCTYPE html>
<html>
<head>
    <title>Minimal API Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { padding: 15px; width: 100%; margin: 10px 0; background: #2563eb; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        pre { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; overflow: auto; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Minimal API Test</h1>
        
        <button onclick="testSimpleAPI()">Test 1: Simple API (no database)</button>
        <pre id="result1">Click to test...</pre>
        
        <button onclick="testDashboardAPI()">Test 2: Dashboard API</button>
        <pre id="result2">Click to test...</pre>
        
        <button onclick="testWelcomeAPI()">Test 3: Welcome API</button>
        <pre id="result3">Click to test...</pre>
    </div>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';
        
        async function testSimpleAPI() {
            const result = document.getElementById('result1');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(`${API_URL}/simple_test.php`);
                const text = await response.text();
                result.innerHTML = `Status: ${response.status}\n\n${text}`;
            } catch (error) {
                result.innerHTML = `❌ Error: ${error.message}\n\nType: ${error.name}`;
            }
        }
        
        async function testDashboardAPI() {
            const result = document.getElementById('result2');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(`${API_URL}/dashboard.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 1 })
                });
                const text = await response.text();
                result.innerHTML = `Status: ${response.status}\n\n${text}`;
            } catch (error) {
                result.innerHTML = `❌ Error: ${error.message}\n\nType: ${error.name}`;
            }
        }
        
        async function testWelcomeAPI() {
            const result = document.getElementById('result3');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(`${API_URL}/welcome.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 1 })
                });
                const text = await response.text();
                result.innerHTML = `Status: ${response.status}\n\n${text}`;
            } catch (error) {
                result.innerHTML = `❌ Error: ${error.message}\n\nType: ${error.name}`;
            }
        }
    </script>
</body>
</html>
