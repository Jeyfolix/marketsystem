<!DOCTYPE html>
<html>
<head>
    <title>marketSystem - Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { color: #333; margin-bottom: 20px; }
        .status { padding: 15px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }
        .status.pending { background: #fef3c7; color: #d97706; }
        .status.verified { background: #d1fae5; color: #059669; }
        .mpesa-box { background: #f3f4f6; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .mpesa-number { font-size: 2rem; font-weight: bold; color: #2563eb; margin: 10px 0; }
        .copy-btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; }
        .submit-btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .message { padding: 10px; border-radius: 5px; margin-top: 10px; display: none; }
        .message.success { background: #d1fae5; color: #059669; display: block; }
        .message.error { background: #fee2e2; color: #dc2626; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f3f4f6; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .badge { padding: 3px 8px; border-radius: 3px; font-size: 12px; }
        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-verified { background: #d1fae5; color: #059669; }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #2563eb; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>💰 Payment Verification</h2>
            
            <div id="statusDiv" class="status pending">
                <span id="statusText">Checking login status...</span>
            </div>
        </div>

        <div id="paymentCard" class="card" style="display: none;">
            <div class="mpesa-box">
                <h3>Send to M-PESA</h3>
                <div class="mpesa-number">0701603497</div>
                <button class="copy-btn" onclick="copyNumber()">Copy Number</button>
                <div style="margin-top: 10px; font-weight: bold;">Amount: KES 300</div>
            </div>

            <form id="paymentForm">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="0712345678" required>
                </div>
                <div class="form-group">
                    <label>M-PESA Code</label>
                    <input type="text" id="mpesaCode" placeholder="PPI8J3K4L5" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Submit Payment</button>
            </form>
            <div id="message" class="message"></div>
        </div>

        <div class="card">
            <h3>Payment History</h3>
            <div id="historyDiv">Loading...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';
        const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
        
        // Check login status
        if (!userData || !userData.id) {
            document.getElementById('statusDiv').className = 'status pending';
            document.getElementById('statusText').innerHTML = '❌ Not logged in. <a href="index.html" style="color:#2563eb; text-decoration:underline;">Login here</a>';
            document.getElementById('paymentCard').style.display = 'none';
        } else {
            document.getElementById('statusDiv').className = 'status verified';
            document.getElementById('statusText').innerHTML = '✅ Logged in as: ' + (userData.name || userData.username);
            document.getElementById('paymentCard').style.display = 'block';
            loadPaymentHistory();
        }

        // Load payment history
        async function loadPaymentHistory() {
            const historyDiv = document.getElementById('historyDiv');
            try {
                const response = await fetch(`${API_URL}/transactions.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userData.id })
                });
                
                const data = await response.json();
                console.log('Payment data:', data);
                
                if (data.success) {
                    if (!data.payments || data.payments.length === 0) {
                        historyDiv.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">No payment history</p>';
                    } else {
                        let html = '<table><tr><th>Date</th><th>Code</th><th>Amount</th><th>Status</th></tr>';
                        data.payments.forEach(p => {
                            const date = new Date(p.created_at).toLocaleString();
                            const statusClass = p.status === 'verified' ? 'badge-verified' : 'badge-pending';
                            html += `<tr>
                                <td>${date}</td>
                                <td>${p.mpesa_code}</td>
                                <td>KES ${p.amount}</td>
                                <td><span class="badge ${statusClass}">${p.status}</span></td>
                            </tr>`;
                        });
                        html += '</table>';
                        historyDiv.innerHTML = html;
                    }
                } else {
                    historyDiv.innerHTML = '<p style="color:red; text-align:center;">Failed to load history</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                historyDiv.innerHTML = '<p style="color:red; text-align:center;">Connection error. Please try again.</p>';
            }
        }

        // Payment form submission
        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const mpesaCode = document.getElementById('mpesaCode').value;
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Submitting...';
            
            try {
                const response = await fetch(`${API_URL}/verify_payment.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userData.id,
                        phone: phone,
                        email: email,
                        mpesa_code: mpesaCode,
                        amount: 300
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ ' + data.message;
                    this.reset();
                    loadPaymentHistory();
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '❌ ' + data.message;
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Connection error. Please try again.';
            }
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Submit Payment';
        });

        // Copy M-PESA number
        window.copyNumber = function() {
            navigator.clipboard.writeText('0701603497').then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        };
    </script>
</body>
</html>
