<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>marketSystem - Payments</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #60a5fa;
            --secondary: #7c3aed;
            --secondary-dark: #5b21b6;
            --accent: #f59e0b;
            --success: #059669;
            --success-light: #10b981;
            --warning: #d97706;
            --danger: #dc2626;
            --dark: #111827;
            --dark-light: #1f2937;
            --gray-dark: #374151;
            --gray: #6b7280;
            --gray-light: #9ca3af;
            --light: #f3f4f6;
            --white: #ffffff;
            --gold: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 1rem 2rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-brand i {
            font-size: 2rem;
            color: var(--primary);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--light);
            padding: 8px 20px;
            border-radius: 50px;
        }

        .profile-image {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .user-info .welcome-text {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .user-info .user-name {
            font-weight: 600;
            color: var(--dark);
        }

        .btn-dashboard {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-dashboard:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Status Card */
        .status-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-left: 5px solid;
            transition: all 0.3s;
        }

        .status-card.pending {
            border-left-color: var(--warning);
        }

        .status-card.verified {
            border-left-color: var(--success);
        }

        .status-card h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
            margin-bottom: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
        }

        .badge-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-verified {
            background: #d1fae5;
            color: #059669;
        }

        /* Payment Card */
        .payment-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .payment-card h2 {
            color: var(--dark);
            margin-bottom: 10px;
        }

        .payment-subtitle {
            color: var(--gray);
            margin-bottom: 30px;
        }

        .mpesa-section {
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(124,58,237,0.1));
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }

        .mpesa-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .mpesa-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .copy-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin: 10px 0;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }

        .amount-badge {
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            margin-top: 10px;
        }

        .form-grid {
            display: grid;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--gray-light);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: var(--success);
            display: block;
        }

        .message.error {
            background: #fee2e2;
            color: var(--danger);
            display: block;
        }

        /* Transactions Card */
        .transactions-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .transactions-header h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--light);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--dark);
            border-radius: 10px 10px 0 0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--gray-light);
        }

        tr:hover {
            background: var(--light);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-verified {
            background: #d1fae5;
            color: #059669;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }

        .stat-icon i {
            font-size: 1.5rem;
            color: white;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark);
        }

        .stat-label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* Login Prompt */
        .login-prompt {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        .login-prompt i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .login-prompt h2 {
            margin-bottom: 20px;
            color: var(--dark);
        }

        .login-prompt p {
            color: var(--gray);
            margin-bottom: 30px;
        }

        .btn-login {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 4px solid var(--light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .mpesa-number {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-store"></i>
                <span>marketSystem</span>
            </div>
            <div class="nav-user">
                <div class="user-profile">
                    <div class="profile-image" id="profileImage">JF</div>
                    <div class="user-info">
                        <div class="welcome-text">Welcome back,</div>
                        <div class="user-name" id="userName">Loading...</div>
                    </div>
                </div>
                <a href="dashboard.html" class="btn-dashboard">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <div id="mainContent" class="main-content">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api';
        const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
        const mainContent = document.getElementById('mainContent');

        // Check if user is logged in
        if (!userData || !userData.id) {
            mainContent.innerHTML = `
                <div class="login-prompt">
                    <i class="fas fa-lock"></i>
                    <h2>Please Login First</h2>
                    <p>You need to be logged in to make payments and view your transaction history.</p>
                    <a href="index.html" class="btn-login">Go to Login</a>
                </div>
            `;
        } else {
            // Show loading
            mainContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="color: var(--gray);">Loading payment details...</p>
                </div>
            `;
            
            // Load payment data
            loadPaymentData();
        }

        // Load payment data
        async function loadPaymentData() {
            try {
                const response = await fetch(`${API_URL}/transactions.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ user_id: userData.id })
                });

                const data = await response.json();
                console.log('Payment data:', data);

                if (data.success) {
                    renderPaymentPage(data);
                } else {
                    showError(data.message || 'Failed to load payment data');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Connection error. Please try again.');
            }
        }

        // Render payment page
        function renderPaymentPage(data) {
            const payments = data.payments || [];
            const currentStatus = data.current_status || 'unpaid';
            
            // Calculate stats
            const totalPaid = payments.reduce((sum, p) => sum + (p.status === 'verified' ? parseFloat(p.amount) : 0), 0);
            const pendingCount = payments.filter(p => p.status === 'pending').length;
            const verifiedCount = payments.filter(p => p.status === 'verified').length;
            
            // Determine status
            let statusText = 'Not Paid';
            let statusClass = 'badge-pending';
            let cardClass = 'pending';
            let statusIcon = 'fa-clock';
            
            if (currentStatus === 'verified') {
                statusText = 'Account Verified';
                statusClass = 'badge-verified';
                cardClass = 'verified';
                statusIcon = 'fa-check-circle';
            } else if (currentStatus === 'pending') {
                statusText = 'Pending Verification';
                statusClass = 'badge-pending';
                cardClass = 'pending';
                statusIcon = 'fa-clock';
            }
            
            // Generate payment history HTML
            let historyHTML = '';
            if (payments.length === 0) {
                historyHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;">No payment history found</td></tr>';
            } else {
                historyHTML = payments.map(p => {
                    const date = new Date(p.created_at).toLocaleString();
                    const pStatusClass = p.status === 'verified' ? 'status-verified' : 'status-pending';
                    const pStatusText = p.status === 'verified' ? 'Verified' : 'Pending';
                    
                    return `
                        <tr>
                            <td>${date}</td>
                            <td>${p.phone || 'N/A'}</td>
                            <td><strong>${p.mpesa_code || 'N/A'}</strong></td>
                            <td>KES ${parseFloat(p.amount).toLocaleString()}</td>
                            <td><span class="status-badge ${pStatusClass}">${pStatusText}</span></td>
                        </tr>
                    `;
                }).join('');
            }
            
            // Update user name in navbar
            document.getElementById('userName').textContent = userData.name || userData.username;
            document.getElementById('profileImage').textContent = (userData.name || userData.username).charAt(0).toUpperCase();
            
            // Render the page
            mainContent.innerHTML = `
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-coins"></i></div>
                        <div class="stat-value">KES ${totalPaid.toLocaleString()}</div>
                        <div class="stat-label">Total Paid</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        <div class="stat-value">${pendingCount}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-value">${verifiedCount}</div>
                        <div class="stat-label">Verified</div>
                    </div>
                </div>

                <!-- Status Card -->
                <div class="status-card ${cardClass}">
                    <h2><i class="fas ${statusIcon}"></i> Account Status</h2>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                    <p style="margin-top: 15px; color: var(--gray);">
                        ${currentStatus === 'verified' 
                            ? 'Your account is verified! You can now earn commissions from referrals.' 
                            : 'Complete your payment of KES 300 to activate your account and start earning.'}
                    </p>
                </div>

                <!-- Payment Card -->
                <div class="payment-card">
                    <h2>🔐 Verify Your Account</h2>
                    <p class="payment-subtitle">Make a payment of KES 300 to activate your account</p>

                    <div class="mpesa-section">
                        <i class="fas fa-mobile-alt mpesa-icon"></i>
                        <h3>Send to M-PESA</h3>
                        <div class="mpesa-number" id="mpesaNumber">0701603497</div>
                        <button class="copy-btn" onclick="copyNumber()">
                            <i class="fas fa-copy"></i> Copy Number
                        </button>
                        <div class="amount-badge">Amount: KES 300</div>
                    </div>

                    <form id="paymentForm" class="form-grid">
                        <div class="form-group">
                            <label for="phone">Your M-PESA Phone Number</label>
                            <input type="tel" id="phone" placeholder="e.g., 0701603497" required>
                        </div>

                        <div class="form-group">
                            <label for="mpesaCode">M-PESA Transaction Code</label>
                            <input type="text" id="mpesaCode" placeholder="e.g., PPI8J3K4L5" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>

                        <button type="submit" class="submit-btn" id="submitBtn">
                            <i class="fas fa-check-circle"></i> Submit Payment
                        </button>
                    </form>

                    <div id="message" class="message"></div>
                </div>

                <!-- Transactions Card -->
                <div class="transactions-card">
                    <div class="transactions-header">
                        <h2><i class="fas fa-history"></i> Payment History</h2>
                        <span class="status-badge ${payments.length > 0 ? 'badge-verified' : ''}">Total: ${payments.length}</span>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Phone</th>
                                    <th>M-PESA Code</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${historyHTML}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            // Setup form submission
            setupPaymentForm();
        }

        // Setup payment form
        function setupPaymentForm() {
            const form = document.getElementById('paymentForm');
            if (!form) return;
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const phone = document.getElementById('phone').value.trim();
                const mpesaCode = document.getElementById('mpesaCode').value.trim();
                const email = document.getElementById('email').value.trim();
                const submitBtn = document.getElementById('submitBtn');
                const messageDiv = document.getElementById('message');
                
                // Validate
                if (!phone || !mpesaCode || !email) {
                    showMessage('Please fill in all fields', 'error', messageDiv);
                    return;
                }
                
                if (phone.length < 10) {
                    showMessage('Please enter a valid phone number', 'error', messageDiv);
                    return;
                }
                
                if (mpesaCode.length < 5) {
                    showMessage('Please enter a valid M-PESA code', 'error', messageDiv);
                    return;
                }
                
                // Disable button
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
                
                try {
                    const response = await fetch(`${API_URL}/verify_payment.php`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            user_id: userData.id,
                            phone: phone,
                            email: email,
                            mpesa_code: mpesaCode,
                            amount: 300
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        showMessage('Payment submitted successfully! Admin will verify within 24 hours.', 'success', messageDiv);
                        form.reset();
                        // Reload data after 2 seconds
                        setTimeout(() => {
                            loadPaymentData();
                        }, 2000);
                    } else {
                        showMessage(data.message || 'Payment submission failed', 'error', messageDiv);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showMessage('Connection error. Please try again.', 'error', messageDiv);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Submit Payment';
                }
            });
        }

        // Show message
        function showMessage(text, type, element) {
            element.className = `message ${type}`;
            element.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}`;
            element.style.display = 'block';
            
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        // Show error
        function showError(message) {
            mainContent.innerHTML = `
                <div class="login-prompt">
                    <i class="fas fa-exclamation-circle" style="color: var(--danger);"></i>
                    <h2 style="color: var(--danger);">Error</h2>
                    <p>${message}</p>
                    <button onclick="location.reload()" class="btn-login" style="background: var(--primary);">Try Again</button>
                </div>
            `;
        }

        // Copy M-PESA number
        window.copyNumber = function() {
            const number = document.getElementById('mpesaNumber').textContent;
            navigator.clipboard.writeText(number).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        };
    </script>
</body>
</html>
