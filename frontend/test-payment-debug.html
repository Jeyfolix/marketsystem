<!DOCTYPE html>
<html>
<head>
    <title>Payment Debug</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Payment API Debug Tool</h2>
    
    <div>
        <h3>Test 1: Direct API Call</h3>
        <button onclick="testAPI()">Test API</button>
        <pre id="result1">Click button to test...</pre>
    </div>
    
    <div>
        <h3>Test 2: With Current User</h3>
        <button onclick="testWithUser()">Test with Current User</button>
        <pre id="result2">Click button to test...</pre>
    </div>

    <script>
        const API_URL = 'https://marketsystem-api.onrender.com/api/verify_payment.php';
        
        async function testAPI() {
            const result = document.getElementById('result1');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: 1,
                        phone: '0701603497',
                        email: 'test@example.com',
                        mpesa_code: 'TEST' + Date.now()
                    })
                });
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                    result.innerHTML = `Status: ${response.status}\n\nResponse: ${JSON.stringify(data, null, 2)}`;
                } catch(e) {
                    result.innerHTML = `Status: ${response.status}\n\nRaw Response: ${text}`;
                }
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function testWithUser() {
            const result = document.getElementById('result2');
            const userData = JSON.parse(sessionStorage.getItem('user') || '{}');
            
            result.innerHTML = `User data: ${JSON.stringify(userData, null, 2)}\n\n`;
            
            if (!userData.id) {
                result.innerHTML += '❌ No user logged in!';
                return;
            }
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userData.id,
                        phone: '0701603497',
                        email: userData.email || 'test@example.com',
                        mpesa_code: 'TEST' + Date.now()
                    })
                });
                
                const text = await response.text();
                result.innerHTML += `Status: ${response.status}\n\nResponse: ${text}`;
            } catch (error) {
                result.innerHTML += `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
